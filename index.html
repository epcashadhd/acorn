<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>The Acorn Journey</title>
    <style>
        @import url('https://fonts.googleapis.com/earlyaccess/cwtexyen.css');

        :root {
            --bg-color: #f7f3ed; 
            --text-brown: #5d4037;
            --btn-transparent: rgba(93, 64, 55, 0.12); 
            --btn-border: rgba(93, 64, 55, 0.25);
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100dvh;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'cwTeXYen', sans-serif;
            -webkit-font-smoothing: antialiased;
            touch-action: none;
        }

        .phone-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-around; 
            padding: env(safe-area-inset-top) 30px calc(20px + env(safe-area-inset-bottom)) 30px;
            box-sizing: border-box;
        }

        .acorn-box {
            width: 60%; 
            max-width: 200px;
            flex-shrink: 0;
            animation: acorn-breathe 5s ease-in-out infinite;
        }

        .acorn-box img {
            width: 100%;
            height: auto;
        }

        @keyframes acorn-breathe {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-8px) scale(1.04); }
        }

        .poem-section {
            display: flex;
            flex-direction: column;
            gap: 15px; 
            color: var(--text-brown);
            text-align: center;
            flex-shrink: 0;
        }

        .poem-line {
            font-size: 26px; 
            font-weight: 500;
            letter-spacing: 0.25em; 
            line-height: 1.4;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
        }

        /* 優化後的平滑圓形按鈕 */
        .start-touch-point {
            background-color: var(--btn-transparent);
            border: 1px solid var(--btn-border);
            width: 85px;  
            height: 85px; 
            border-radius: 50%;
            cursor: pointer;
            outline: none;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-brown);
            font-family: 'cwTeXYen', sans-serif;
            font-size: 18px;
            position: relative;
            /* 這裡增加了 transition，讓狀態改變變得很慢很柔 */
            transition: all 0.6s cubic-bezier(0.25, 0.1, 0.25, 1);
            animation: ripple-breathe 4s infinite ease-in-out;
            -webkit-tap-highlight-color: transparent; /* 移除行動裝置預設藍色高亮 */
        }

        .start-touch-point::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 50%;
            border: 1px solid var(--btn-border);
            animation: ripple-outer 4s infinite ease-out;
            transition: opacity 0.6s;
        }

        @keyframes ripple-breathe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        @keyframes ripple-outer {
            0% { transform: scale(1); opacity: 0.6; }
            100% { transform: scale(1.8); opacity: 0; }
        }

        /* 當按鈕被按下時，緩慢縮小並加深背景色 */
        .start-touch-point:active {
            transform: scale(0.85); /* 稍微縮小多一點 */
            background-color: rgba(93, 64, 55, 0.35); /* 顏色變深 */
            border-color: rgba(93, 64, 55, 0.5);
        }

        .start-touch-point:active::after {
            opacity: 0; /* 按下時外圈消失，增加專注感 */
        }
    </style>
</head>
<body>

<div class="phone-container">
    <div class="acorn-box">
        <img src="acorn.png" alt="橡實">
    </div>

    <div class="poem-section">
        <div class="poem-line">我是一顆橡實</div>
        <div class="poem-line">外殼堅韌</div>
        <div class="poem-line">內裡蘊藏生命</div>
        <div class="poem-line">扎根在泥土</div>
        <div class="poem-line">終將長成大樹</div>
    </div>

    <div class="btn-container">
        <button class="start-touch-point" onclick="handleStart()">開始</button>
    </div>
</div>

<script>
    function handleStart() {
        // 先執行按鈕動畫的觸覺回饋，延遲 400 毫秒再跳轉
        setTimeout(function() {
            window.location.href = 'page7.html';
        }, 400);
    }
</script>

</body>
</html>
