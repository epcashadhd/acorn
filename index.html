<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>The Acorn Journey</title>
    <style>
        @import url('https://fonts.googleapis.com/earlyaccess/cwtexyen.css');

        :root {
            --bg-color: #f7f3ed; 
            --text-brown: #5d4037;
            --btn-border: rgba(93, 64, 55, 0.2);
        }

        html, body {
            margin: 0; padding: 0;
            width: 100vw; height: 100dvh;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'cwTeXYen', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .phone-container {
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: space-around; 
            padding: env(safe-area-inset-top) 30px calc(20px + env(safe-area-inset-bottom)) 30px;
            box-sizing: border-box;
        }

        .acorn-box {
            width: 55%; max-width: 190px;
            animation: acorn-breathe 6s ease-in-out infinite;
        }
        .acorn-box img { width: 100%; height: auto; }

        @keyframes acorn-breathe {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-8px) scale(1.03); }
        }

        .poem-section {
            display: flex; flex-direction: column;
            gap: 15px; color: var(--text-brown);
            text-align: center;
        }
        .poem-line {
            font-size: 26px; font-weight: 500;
            letter-spacing: 0.25em; line-height: 1.4;
        }

        /* --- 按鈕基礎 --- */
        .btn-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .start-touch-point {
            background-color: rgba(93, 64, 55, 0.08);
            border: 1px solid var(--btn-border);
            width: 90px; height: 90px; 
            border-radius: 50%;
            cursor: pointer;
            outline: none;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-brown);
            font-family: 'cwTeXYen', sans-serif;
            font-size: 18px;
            position: relative;
            z-index: 2;
            
            /* 平時呼吸動畫與恢復原始狀態的曲線 (慢速) */
            transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1), background-color 1s ease;
            animation: btn-breathe 4s infinite ease-in-out;
            -webkit-tap-highlight-color: transparent;
        }

        @keyframes btn-breathe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }

        .start-touch-point::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 50%;
            border: 1px solid var(--btn-border);
            z-index: -1;
            animation: ripple-wave 4s infinite ease-out;
            transition: opacity 0.8s ease;
        }

        @keyframes ripple-wave {
            0% { transform: scale(1); opacity: 0.6; }
            100% { transform: scale(1.8); opacity: 0; }
        }

        /* --- 針對 Mac 電腦版修正：慢慢按落去，慢慢彈返起 --- */
        @media (hover: hover) {
            /* 慢慢按落去 (MouseDown) */
            .start-touch-point:active {
                transform: scale(0.9) !important; 
                background-color: rgba(93, 64, 55, 0.25);
                /* 0.8秒緩慢受壓，不突兀 */
                transition: transform 0.8s cubic-bezier(0.2, 0.6, 0.3, 1);
                animation-play-state: paused;
            }
        }

        /* --- 點擊完成後 (is-pressing)：慢慢彈返起並淡出 --- */
        .start-touch-point.is-pressing {
            animation: none !important; 
            /* 模擬回彈效果：彈回接近原始大小，營造一種鬆了一口氣的感覺 */
            transform: scale(0.98) !important; 
            background-color: rgba(93, 64, 55, 0.1);
            opacity: 0.8;
            /* 慢慢彈返起的曲線，持續 1.2 秒 */
            transition: transform 1.2s cubic-bezier(0.12, 0.8, 0.3, 1), background-color 1.2s ease, opacity 1s ease;
        }
        
        .start-touch-point.is-pressing::after {
            opacity: 0;
        }
    </style>
</head>
<body>

<div class="phone-container">
    <div class="acorn-box">
        <img src="acorn.png" alt="橡實">
    </div>

    <div class="poem-section">
        <div class="poem-line">我是一顆橡實</div>
        <div class="poem-line">外殼堅韌</div>
        <div class="poem-line">內裡蘊藏生命</div>
        <div class="poem-line">扎根在泥土</div>
        <div class="poem-line">終將長成大樹</div>
    </div>

    <div class="btn-container">
        <button id="mainBtn" class="start-touch-point" onclick="handleStart()">開始</button>
    </div>
</div>

<script>
    let isTransitioning = false;

    function handleStart() {
        if (isTransitioning) return;
        isTransitioning = true;

        const btn = document.getElementById('mainBtn');
        
        // 加入 class，觸發 CSS 中設定的「慢慢彈起」transition
        btn.classList.add('is-pressing');

        // 延長等待時間，讓「慢慢彈起」的過程被完整看見
        setTimeout(function() {
            document.body.style.transition = "opacity 1.5s ease";
            document.body.style.opacity = "0";
            
            setTimeout(() => {
                window.location.href = 'page2.html';
            }, 1000);
        }, 1200); // 這裡的延遲要配合彈起的時間
    }
</script>

</body>
</html>
