<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>The Acorn Journey</title>
    <style>
        @import url('https://fonts.googleapis.com/earlyaccess/cwtexyen.css');

        :root {
            --bg-color: #f7f3ed; 
            --text-brown: #5d4037;
            --btn-transparent: rgba(93, 64, 55, 0.12); 
            --btn-border: rgba(93, 64, 55, 0.25);
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100dvh;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'cwTeXYen', sans-serif;
            -webkit-font-smoothing: antialiased;
            touch-action: none;
        }

        /* 改用 Flexbox 自動分配空間，防止重疊 */
        .phone-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-evenly; /* 平均分配各元件間的距離 */
            padding: env(safe-area-inset-top) 30px env(safe-area-inset-bottom) 30px;
            box-sizing: border-box;
        }

        /* 橡實動畫：縮小尺寸以騰出垂直空間 */
        .acorn-box {
            width: 45%; 
            max-width: 160px;
            animation: acorn-breathe 5s ease-in-out infinite;
            flex-shrink: 0; /* 禁止圖片被擠壓 */
        }

        .acorn-box img {
            width: 100%;
            height: auto;
        }

        @keyframes acorn-breathe {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-5px) scale(1.03); }
        }

        .poem-section {
            display: flex;
            flex-direction: column;
            gap: 8px; /* 縮小行距適配 iPhone Mini */
            color: var(--text-brown);
            text-align: center;
            flex-shrink: 0;
        }

        .poem-line {
            font-size: 20px; /* 稍微縮小字體防止換行或擁擠 */
            font-weight: 500;
            letter-spacing: 0.2em;
        }

        /* 圓形按鈕容器 */
        .btn-container {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
            padding-bottom: 20px;
        }

        .start-touch-point {
            background-color: var(--btn-transparent);
            border: 1px solid var(--btn-border);
            width: 70px;  
            height: 70px; 
            border-radius: 50%;
            cursor: pointer;
            outline: none;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-brown);
            font-family: 'cwTeXYen', sans-serif;
            font-size: 16px;
            animation: ripple-breathe 4s infinite ease-in-out;
            position: relative;
        }

        /* 波紋動畫 */
        .start-touch-point::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 50%;
            border: 1px solid var(--btn-border);
            animation: ripple-outer 4s infinite ease-out;
        }

        @keyframes ripple-breathe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }

        @keyframes ripple-outer {
            0% { transform: scale(1); opacity: 0.6; }
            100% { transform: scale(1.6); opacity: 0; }
        }

        .start-touch-point:active {
            transform: scale(0.92);
        }
    </style>
</head>
<body>

<div class="phone-container">
    <div class="acorn-box">
        <img src="acorn.png" alt="橡實">
    </div>

    <div class="poem-section">
        <div class="poem-line">我是一顆橡實</div>
        <div class="poem-line">外殼堅韌</div>
        <div class="poem-line">內裡蘊藏生命</div>
        <div class="poem-line">扎根在泥土</div>
        <div class="poem-line">終將長成大樹</div>
    </div>

    <div class="btn-container">
        <button class="start-touch-point" onclick="location.href='page7.html'">開始</button>
    </div>
</div>

</body>
</html>
