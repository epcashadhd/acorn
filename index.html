<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>The Acorn Journey</title>
    <style>
        @import url('https://fonts.googleapis.com/earlyaccess/cwtexyen.css');

        :root {
            --bg-color: #f7f3ed; 
            --text-brown: #5d4037;
            --btn-border: rgba(93, 64, 55, 0.2);
            --safe-top: env(safe-area-inset-top, 20px);
            --safe-bottom: env(safe-area-inset-bottom, 20px);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100dvh;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'cwTeXYen', sans-serif;
            -webkit-font-smoothing: antialiased;
            color: var(--text-brown);
            overscroll-behavior: none;
        }

        /* Main Layout Wrapper - Centers the "Phone" on larger screens */
        .app-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* The "Phone" Container - Constrained to iPhone 13 mini width */
        .page-container {
            width: 100%;
            max-width: 375px; /* iPhone 13 mini width */
            height: 100%;
            position: relative;
            overflow-y: auto; /* Allow scrolling if content overflows vertically */
            overflow-x: hidden;
        }

        .page {
            position: absolute;
            top: 0; left: 0;
            width: 100%; 
            min-height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-around; /* Distribute space evenly */
            padding: max(2rem, var(--safe-top)) 2rem max(3rem, var(--safe-bottom));
            opacity: 0;
            visibility: hidden;
            transition: opacity 1.5s ease-in-out, visibility 1.5s;
            background-color: var(--bg-color);
        }

        .page.active {
            opacity: 1;
            visibility: visible;
            z-index: 10;
        }

        /* --- Content Elements --- */

        /* Acorn Image & Animation */
        .acorn-wrapper {
            width: 55%; 
            max-width: 190px;
            animation: acorn-breathe 6s ease-in-out infinite;
        }
        .acorn-wrapper img { 
            width: 100%; 
            height: auto; 
            display: block;
        }

        @keyframes acorn-breathe {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-8px) scale(1.03); }
        }

        /* Text Sections */
        .poem-section {
            display: flex; 
            flex-direction: column;
            gap: 1rem; 
            text-align: center;
        }
        .poem-line { 
            font-size: 26px; 
            font-weight: 500; 
            letter-spacing: 0.25em; 
            line-height: 1.4; 
        }

        .instruction-section {
            width: 100%;
            text-align: center;
            font-size: 1.25rem; /* ~20px */
            line-height: 2.2;
            letter-spacing: 0.1em;
        }
        
        .instruction-section p {
            margin: 0;
        }
        
        .spacer {
            height: 2rem;
        }

        /* Small Acorn Icon inline */
        .end-acorn {
            display: inline-block;
            width: 28px;
            height: auto;
            vertical-align: middle;
            margin-left: 8px;
            opacity: 0.8;
        }

        /* --- Button Styles --- */
        .btn-container { 
            position: relative; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            margin-top: 1rem;
        }

        .acorn-btn {
            background-color: rgba(93, 64, 55, 0.08);
            border: 1px solid var(--btn-border);
            width: 90px; height: 90px; 
            border-radius: 50%;
            cursor: pointer; 
            outline: none;
            display: flex; 
            justify-content: center; 
            align-items: center;
            color: var(--text-brown); 
            font-family: 'cwTeXYen', sans-serif;
            font-size: 18px; 
            position: relative; 
            z-index: 2;
            transition: transform 0.3s ease, background-color 0.3s;
            animation: btn-breathe 4s infinite ease-in-out;
        }

        .acorn-btn:hover {
            background-color: rgba(93, 64, 55, 0.12);
            transform: scale(1.05);
        }

        .acorn-btn:active {
            transform: scale(0.95);
        }

        /* Ripple Effect Background */
        .ripple-bg {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 90px; height: 90px;
            border-radius: 50%;
            border: 1px solid var(--btn-border);
            pointer-events: none;
            animation: ripple-wave 4s infinite ease-out;
            z-index: 1;
        }

        @keyframes btn-breathe { 
            0%, 100% { transform: scale(1); } 
            50% { transform: scale(1.08); } 
        }

        @keyframes ripple-wave { 
            0% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; } 
            100% { transform: translate(-50%, -50%) scale(1.8); opacity: 0; } 
        }

        /* Utility */
        .hidden { display: none; }

        /* Page 3 Styles */
        .page-3-content {
            text-align: center;
        }
        .page-3-title {
            font-size: 1.5rem;
            letter-spacing: 0.1em;
            margin-bottom: 1rem;
        }
        .page-3-subtitle {
            opacity: 0.6;
            font-size: 1rem;
        }
        .reset-link {
            display: block;
            margin-top: 2rem;
            font-size: 0.875rem;
            opacity: 0.5;
            text-decoration: underline;
            text-underline-offset: 4px;
            cursor: pointer;
            transition: opacity 0.3s;
        }
        .reset-link:hover { opacity: 1; }

    </style>
</head>
<body>

<div class="app-wrapper">
    <div class="page-container">
        
        <!-- PAGE 1 -->
        <div id="page1" class="page active">
            <div class="acorn-wrapper">
                <img src="https://github.com/epcashadhd/acorn/blob/main/acorn.png?raw=true" alt="橡實" referrerpolicy="no-referrer">
            </div>
            
            <div class="poem-section">
                <div class="poem-line">我是一顆橡實</div>
                <div class="poem-line">外殼堅韌</div>
                <div class="poem-line">內裡蘊藏生命</div>
                <div class="poem-line">扎根在泥土</div>
                <div class="poem-line">終將長成大樹</div>
            </div>
            
            <div class="btn-container">
                <div class="ripple-bg"></div>
                <button class="acorn-btn" onclick="goToPage(2)">開始</button>
            </div>
        </div>

        <!-- PAGE 2 -->
        <div id="page2" class="page">
            <div class="instruction-section">
                <p>開始前先讓自己安頓下來</p>
                <p>找一個舒適的位置坐下</p>
                
                <div class="spacer"></div>
                
                <p>輕輕閉上眼睛</p>
                <p>感受雙腳接觸地面</p>
                
                <div class="spacer"></div>
                
                <p>想像自己是一顆橡實</p>
                <p>靜靜扎根</p>
                <p>慢慢吸氣再緩緩呼氣</p>
                <p>
                    感謝自己完成這個安頓的片刻
                    <img src="https://github.com/epcashadhd/acorn/blob/main/1.png?raw=true" class="end-acorn" alt="小橡實" referrerpolicy="no-referrer">
                </p>
            </div>

            <div class="btn-container">
                <div class="ripple-bg"></div>
                <button class="acorn-btn" onclick="goToPage(3)">下一步</button>
            </div>
        </div>

        <!-- PAGE 3 (End) -->
        <div id="page3" class="page">
            <div class="page-3-content">
                <h2 class="page-3-title">旅程待續...</h2>
                <p class="page-3-subtitle">（這是示範頁面的結尾）</p>
                <a class="reset-link" onclick="goToPage(1)">回到首頁</a>
            </div>
        </div>

    </div>
</div>

<script>
    function goToPage(pageNumber) {
        // Find current active page
        const activePage = document.querySelector('.page.active');
        
        // Find target page
        const targetPage = document.getElementById('page' + pageNumber);
        
        if (activePage && targetPage) {
            // Fade out current
            activePage.style.opacity = '0';
            
            // Wait for transition to finish before hiding completely and showing next
            setTimeout(() => {
                activePage.classList.remove('active');
                
                // Prepare target page (ensure it's visible but transparent first)
                targetPage.classList.add('active');
                
                // Small delay to allow DOM to register the class change before fading in
                requestAnimationFrame(() => {
                    targetPage.style.opacity = '1';
                });
            }, 1500); // Matches CSS transition duration
        }
    }
</script>

</body>
</html>
