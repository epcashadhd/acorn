<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>The Acorn Journey</title>
    <style>
        @import url('https://fonts.googleapis.com/earlyaccess/cwtexyen.css');

        :root {
            --bg-color: #f7f3ed; 
            --text-brown: #5d4037;
            --btn-border: rgba(93, 64, 55, 0.2);
        }

        html, body {
            margin: 0; padding: 0;
            width: 100vw; height: 100dvh;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'cwTeXYen', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .phone-container {
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: space-around; 
            padding: env(safe-area-inset-top) 30px calc(20px + env(safe-area-inset-bottom)) 30px;
            box-sizing: border-box;
        }

        .acorn-box {
            width: 55%; max-width: 190px;
            animation: acorn-breathe 6s ease-in-out infinite;
        }
        .acorn-box img { width: 100%; height: auto; }

        @keyframes acorn-breathe {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-8px) scale(1.03); }
        }

        .poem-section {
            display: flex; flex-direction: column;
            gap: 15px; color: var(--text-brown);
            text-align: center;
        }
        .poem-line {
            font-size: 26px; font-weight: 500;
            letter-spacing: 0.25em; line-height: 1.4;
        }

        /* --- 基礎按鈕設定 --- */
        .btn-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .start-touch-point {
            background-color: rgba(93, 64, 55, 0.08);
            border: 1px solid var(--btn-border);
            width: 90px; height: 90px; 
            border-radius: 50%;
            cursor: pointer;
            outline: none;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-brown);
            font-family: 'cwTeXYen', sans-serif;
            font-size: 18px;
            position: relative;
            z-index: 2;
            
            /* iPhone/iPad 預設回歸：快速且平滑 */
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1), background-color 0.4s;
            animation: btn-breathe 4s infinite ease-in-out;
            -webkit-tap-highlight-color: transparent;
        }

        @keyframes btn-breathe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }

        .start-touch-point::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 50%;
            border: 1px solid var(--btn-border);
            z-index: -1;
            animation: ripple-wave 4s infinite ease-out;
        }

        @keyframes ripple-wave {
            0% { transform: scale(1); opacity: 0.6; }
            100% { transform: scale(1.8); opacity: 0; }
        }

        /* --- 專屬 Mac/滑鼠 (Pointer) 優化：慢慢按、慢慢彈 --- */
        @media (hover: hover) and (pointer: fine) {
            .start-touch-point:active {
                transform: scale(0.9) !important; 
                transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1) !important;
            }

            .start-touch-point.is-pressing {
                transform: scale(0.98) !important;
                transition: transform 1.2s cubic-bezier(0.12, 0.8, 0.3, 1) !important;
                background-color: rgba(93, 64, 55, 0.1) !important;
            }
        }

        /* --- iPhone/iPad 觸控點擊後的狀態：保持原本絲滑 --- */
        .start-touch-point.is-pressing {
            animation: none !important;
            transform: scale(0.85); /* 觸控裝置使用原本滿意的比例 */
            opacity: 0.8;
            background-color: rgba(93, 64, 55, 0.3);
            transition: transform 0.6s ease-out, background-color 0.6s ease;
        }

        .start-touch-point.is-pressing::after {
            opacity: 0;
            transition: opacity 0.4s ease;
        }
    </style>
</head>
<body>

<div class="phone-container">
    <div class="acorn-box">
        <img src="acorn.png" alt="橡實">
    </div>

    <div class="poem-section">
        <div class="poem-line">我是一顆橡實</div>
        <div class="poem-line">外殼堅韌</div>
        <div class="poem-line">內裡蘊藏生命</div>
        <div class="poem-line">扎根在泥土</div>
        <div class="poem-line">終將長成大樹</div>
    </div>

    <div class="btn-container">
        <button id="mainBtn" class="start-touch-point" onclick="handleStart()">開始</button>
    </div>
</div>

<script>
    let isTransitioning = false;

    function handleStart() {
        if (isTransitioning) return;
        isTransitioning = true;

        const btn = document.getElementById('mainBtn');
        btn.classList.add('is-pressing');

        // 偵測是否為觸控裝置
        const isTouch = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
        const delay = isTouch ? 600 : 1200; // 觸控裝置跳轉稍快(600ms)，Mac保持緩慢(1200ms)

        setTimeout(function() {
            document.body.style.transition = "opacity 1s ease";
            document.body.style.opacity = "0";
            
            setTimeout(() => {
                window.location.href = 'page2.html';
            }, 800);
        }, delay);
    }
</script>

</body>
</html>
