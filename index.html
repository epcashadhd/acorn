<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>The Acorn Journey</title>
    <style>
        @import url('https://fonts.googleapis.com/earlyaccess/cwtexyen.css');

        :root {
            --bg-color: #f7f3ed; 
            --text-brown: #5d4037;
            --btn-border: rgba(93, 64, 55, 0.2);
        }

        html, body {
            margin: 0; padding: 0;
            width: 100vw; height: 100dvh;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'cwTeXYen', sans-serif;
            -webkit-font-smoothing: antialiased;
            color: var(--text-brown);
        }

        .page-container {
            width: 100%; height: 100%;
            position: relative;
        }

        .page {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-around;
            padding: env(safe-area-inset-top) 30px calc(20px + env(safe-area-inset-bottom)) 30px;
            box-sizing: border-box;
            opacity: 0;
            visibility: hidden;
            transition: opacity 1.5s ease-in-out, visibility 1.5s;
        }

        .page.active {
            opacity: 1;
            visibility: visible;
        }

        /* --- Page 1 橡實動畫 --- */
        .acorn-box {
            width: 55%; max-width: 190px;
            animation: acorn-breathe 6s ease-in-out infinite;
        }
        .acorn-box img { width: 100%; height: auto; }

        @keyframes acorn-breathe {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-8px) scale(1.03); }
        }

        .poem-section {
            display: flex; flex-direction: column;
            gap: 15px; text-align: center;
        }
        .poem-line { font-size: 26px; font-weight: 500; letter-spacing: 0.25em; line-height: 1.4; }

        /* --- Page 2 文字內容排版 --- */
        .instruction-section {
            max-width: 400px;
            width: 100%;
            text-align: center; /* 改為全置中 */
            font-size: 1.25rem;
            line-height: 2.2;
            letter-spacing: 0.1em;
        }

        /* 1.png 小橡實位置：跟隨在文字末尾 */
        .end-acorn {
            display: inline-block;
            width: 28px;
            height: auto;
            vertical-align: middle;
            margin-left: 10px;
            opacity: 0.8;
        }

        /* --- 諮商風格按鈕核心 (Mac & iPhone 一致) --- */
        .btn-container { position: relative; display: flex; justify-content: center; align-items: center; }

        .start-touch-point {
            background-color: rgba(93, 64, 55, 0.08);
            border: 1px solid var(--btn-border);
            width: 90px; height: 90px; 
            border-radius: 50%;
            cursor: pointer; outline: none;
            display: flex; justify-content: center; align-items: center;
            color: var(--text-brown); font-family: 'cwTeXYen', sans-serif;
            font-size: 18px; position: relative; z-index: 2;
            transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1), background-color 1.2s;
            animation: btn-breathe 4s infinite ease-in-out;
            -webkit-tap-highlight-color: transparent;
        }

        @keyframes btn-breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }

        .start-touch-point::after {
            content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 50%; border: 1px solid var(--btn-border);
            z-index: -1; animation: ripple-wave 4s infinite ease-out;
        }

        @keyframes ripple-wave { 0% { transform: scale(1); opacity: 0.6; } 100% { transform: scale(1.8); opacity: 0; } }

        .start-touch-point:active {
            transform: scale(0.88) !important;
            transition: transform 1.0s cubic-bezier(0.2, 0.5, 0.3, 1) !important;
        }

        .start-touch-point.is-pressing {
            animation: none !important;
            transform: scale(1.05) !important;
            background-color: rgba(93, 64, 55, 0.12);
            transition: transform 1.5s cubic-bezier(0.2, 0.8, 0.4, 1) !important;
        }
        
        .start-touch-point.is-pressing::after { opacity: 0; transition: opacity 1.2s ease; }
    </style>
</head>
<body>

<div class="page-container">
    <div id="page1" class="page active">
        <div class="acorn-box">
            <img src="acorn.png" alt="橡實">
        </div>
        <div class="poem-section">
            <div class="poem-line">我是一顆橡實</div>
            <div class="poem-line">外殼堅韌</div>
            <div class="poem-line">內裡蘊藏生命</div>
            <div class="poem-line">扎根在泥土</div>
            <div class="poem-line">終將長成大樹</div>
        </div>
        <div class="btn-container">
            <button class="start-touch-point" onclick="showPage(2)">開始</button>
        </div>
    </div>

    <div id="page2" class="page">
        <div class="instruction-section">
            <p>開始前先讓自己安頓下來<br>找一個舒適的位置坐下</p>
            
            <p style="margin: 2rem 0;">輕輕閉上眼睛<br>感受雙腳接觸地面</p>
            
            <p>想像自己是一顆橡實<br>
               靜靜扎根<br>
               慢慢吸氣再緩緩呼氣<br>
               感謝自己完成這個安頓的片刻
               <img src="1.png" class="end-acorn" alt="小橡實">
            </p>
        </div>

        <div class="btn-container">
            <button class="start-touch-point" onclick="showPage(3)">下一步</button>
        </div>
    </div>
</div>

<script>
    let isTransitioning = false;

    function showPage(pageNumber) {
        if (isTransitioning) return;
        isTransitioning = true;

        const currentBtn = event.currentTarget;
        currentBtn.classList.add('is-pressing');

        setTimeout(() => {
            // 隱藏當前頁面
            const pages = document.querySelectorAll('.page');
            pages.forEach(p => p.classList.remove('active'));

            // 顯示下一頁
            const targetPage = document.getElementById('page' + pageNumber);
            if (targetPage) {
                targetPage.classList.add('active');
            }

            setTimeout(() => {
                isTransitioning = false;
                currentBtn.classList.remove('is-pressing');
            }, 1500);
        }, 1600); 
    }
</script>

</body>
</html>
