<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>The Acorn Journey</title>
    <style>
        @import url('https://fonts.googleapis.com/earlyaccess/cwtexyen.css');

        :root {
            --bg-color: #f7f3ed; 
            --text-brown: #5d4037;
            --btn-transparent: rgba(93, 64, 55, 0.12); 
            --btn-border: rgba(93, 64, 55, 0.25);
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100dvh;
            overflow: hidden;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'cwTeXYen', sans-serif;
            -webkit-font-smoothing: antialiased;
            touch-action: none;
        }

        .phone-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0 40px;
            box-sizing: border-box;
            position: relative;
        }

        /* 橡實動畫：縮小浮動範圍（從 -10px 改為 -5px），避免遮擋文字 */
        .acorn-box {
            width: 55%; 
            max-width: 180px;
            margin-bottom: 30px; /* 增加一點點與文字的固定距離 */
            animation: acorn-breathe 5s ease-in-out infinite;
        }

        .acorn-box img {
            width: 100%;
            height: auto;
        }

        @keyframes acorn-breathe {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-5px) scale(1.03); } /* 減小位移與縮放比例 */
        }

        .poem-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
            color: var(--text-brown);
            text-align: center;
            z-index: 2; /* 確保文字層級在最前 */
        }

        .poem-line {
            font-size: 22px;
            font-weight: 500;
            letter-spacing: 0.25em;
        }

        /* 縮小後的半透明圓形按鈕 */
        .start-touch-point {
            background-color: var(--btn-transparent);
            border: 1px solid var(--btn-border);
            width: 75px;  /* 從 90px 縮小到 75px */
            height: 75px; /* 從 90px 縮小到 75px */
            border-radius: 50%;
            cursor: pointer;
            position: relative;
            outline: none;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-brown);
            font-family: 'cwTeXYen', sans-serif;
            font-size: 16px; /* 字體也微調縮小 */
            letter-spacing: 0.1em;
            animation: ripple-breathe 4s infinite ease-in-out;
            transition: all 0.3s;
        }

        .start-touch-point::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 50%;
            border: 1px solid var(--btn-border);
            animation: ripple-outer 4s infinite ease-out;
        }

        @keyframes ripple-breathe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.06); }
        }

        @keyframes ripple-outer {
            0% { transform: scale(1); opacity: 0.6; }
            100% { transform: scale(1.6); opacity: 0; }
        }

        .start-touch-point:active {
            transform: scale(0.92);
            background-color: rgba(93, 64, 55, 0.3);
        }

        .btn-container {
            position: absolute;
            bottom: calc(12% + env(safe-area-inset-bottom));
            width: 100%;
            display: flex;
            justify-content: center;
        }
    </style>
</head>
<body>

<div class="phone-container">
    <div class="acorn-box">
        <img src="acorn.png" alt="橡實">
    </div>

    <div class="poem-section">
        <div class="poem-line">我是一顆橡實</div>
        <div class="poem-line">外殼堅韌</div>
        <div class="poem-line">內裡蘊藏生命</div>
        <div class="poem-line">扎根在泥土</div>
        <div class="poem-line">終將長成大樹</div>
    </div>

    <div class="btn-container">
        <button class="start-touch-point" onclick="location.href='page7.html'">開始</button>
    </div>
</div>

</body>
</html>
