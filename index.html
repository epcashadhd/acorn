<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>The Acorn Journey</title>
    <style>
        @import url('https://fonts.googleapis.com/earlyaccess/cwtexyen.css');

        :root {
            --bg-color: #f7f3ed; 
            --text-brown: #5d4037;
            --btn-transparent: rgba(93, 64, 55, 0.12); 
            --btn-border: rgba(93, 64, 55, 0.25);
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100dvh;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'cwTeXYen', sans-serif;
            -webkit-font-smoothing: antialiased;
            touch-action: none;
        }

        .phone-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* 使用 space-around 讓頂部和底部留白更自然 */
            justify-content: space-around; 
            padding: env(safe-area-inset-top) 30px calc(20px + env(safe-area-inset-bottom)) 30px;
            box-sizing: border-box;
        }

        /* 放大圖片尺寸，佔據更多視覺空間 */
        .acorn-box {
            width: 60%; 
            max-width: 200px;
            flex-shrink: 0;
            animation: acorn-breathe 5s ease-in-out infinite;
        }

        .acorn-box img {
            width: 100%;
            height: auto;
        }

        @keyframes acorn-breathe {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-8px) scale(1.04); }
        }

        /* 強化詩句字體與間距 */
        .poem-section {
            display: flex;
            flex-direction: column;
            gap: 15px; /* 增加行與行的間距 */
            color: var(--text-brown);
            text-align: center;
            flex-shrink: 0;
        }

        .poem-line {
            font-size: 26px; /* 顯著放大字體 */
            font-weight: 500;
            letter-spacing: 0.25em; /* 增加字距讓排版更優雅 */
            line-height: 1.4;
        }

        /* 圓形按鈕 */
        .btn-container {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
        }

        .start-touch-point {
            background-color: var(--btn-transparent);
            border: 1px solid var(--btn-border);
            width: 85px;  /* 稍微放大一點點按鈕 */
            height: 85px; 
            border-radius: 50%;
            cursor: pointer;
            outline: none;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-brown);
            font-family: 'cwTeXYen', sans-serif;
            font-size: 18px;
            position: relative;
            animation: ripple-breathe 4s infinite ease-in-out;
        }

        .start-touch-point::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 50%;
            border: 1px solid var(--btn-border);
            animation: ripple-outer 4s infinite ease-out;
        }

        @keyframes ripple-breathe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        @keyframes ripple-outer {
            0% { transform: scale(1); opacity: 0.6; }
            100% { transform: scale(1.8); opacity: 0; }
        }

        .start-touch-point:active {
            transform: scale(0.92);
        }
    </style>
</head>
<body>

<div class="phone-container">
    <div class="acorn-box">
        <img src="acorn.png" alt="橡實">
    </div>

    <div class="poem-section">
        <div class="poem-line">我是一顆橡實</div>
        <div class="poem-line">外殼堅韌</div>
        <div class="poem-line">內裡蘊藏生命</div>
        <div class="poem-line">扎根在泥土</div>
        <div class="poem-line">終將長成大樹</div>
    </div>

    <div class="btn-container">
        <button class="start-touch-point" onclick="location.href='page7.html'">開始</button>
    </div>
</div>

</body>
</html>
